<div id="music-panel">

        <h3>music</h3>
        <div class="close-music" onclick="closeMusicPanel()">×</div>
    </div>
    <div class="music-iframe-container">
        <iframe id="music-iframe" src="https://monochrome.tf" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<style>
    #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 60px;
        height: 100vh;
        background: rgba(17, 17, 17, 0.98);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(58, 58, 58, 0.5);
        display: flex;
        flex-direction: column;
        z-index: 1100;
        transition: width 0.3s ease;
        overflow: hidden;
    }

    #sidebar.collapsed {
        width: 0;
        border-right: none;
    }

    #sidebar.collapsed .close-sidebar-btn {
        display: none;
    }

    .close-sidebar-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(42, 42, 42, 0.8);
        border: 1px solid #4a4a4a;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #999;
        font-size: 18px;
        z-index: 1200;
    }

    .close-sidebar-btn:hover {
        background: rgba(58, 58, 58, 0.9);
        color: #fff;
        transform: rotate(90deg);
    }

    .open-sidebar-btn {
        position: fixed;
        left: 10px;
        top: 10px;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: rgba(26, 26, 26, 0.9);
        backdrop-filter: blur(5px);
        border: 1px solid #333;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1100;
        transition: all 0.2s ease;
        color: white;
        font-size: 24px;
    }

    .open-sidebar-btn:hover {
        background: rgba(37, 37, 37, 0.95);
        border-color: #444;
        transform: scale(1.05);
    }

    body.sidebar-collapsed .open-sidebar-btn {
        display: flex;
    }

    .sidebar-logo {
        padding: 20px;
        text-align: center;
    }

    .sidebar-logo h2 {
        font-size: 18px;
        font-weight: 500;
        color: #fff;
    }

    .nav-item {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        cursor: pointer;
        transition: 0.2s;
        color: #aaa;
        border-left: 3px solid transparent;
    }

    .nav-item:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
    }

    .nav-item.active {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border-left-color: #fff;
    }

    .nav-item svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
    }

    .nav-item img {
        width: 24px;
        height: 24px;
        object-fit: contain;
    }

    #music-panel {
        position: fixed;
        right: -400px;
        top: 0;
        width: 380px;
        height: 100vh;
        background: rgba(17, 17, 17, 0.98);
        backdrop-filter: blur(10px);
        border-left: 1px solid rgba(58, 58, 58, 0.5);
        z-index: 1150;
        transition: right 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    #music-panel.open {
        right: 0;
    }

    .music-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(58, 58, 58, 0.5);
    }

    .music-header h3 {
        color: #fff;
        font-size: 16px;
        font-weight: 500;
    }

    .close-music {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(42, 42, 42, 0.8);
        border: 1px solid #4a4a4a;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        color: #999;
        font-size: 18px;
    }

    .close-music:hover {
        background: rgba(58, 58, 58, 0.9);
        color: #fff;
    }

    .music-iframe-container {
        flex: 1;
        position: relative;
    }

    #music-iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: #0c0c0c;
    }
</style>

<script>
    function toggleMusicPanel() {
        const panel = document.getElementById('music-panel');
        const iframe = document.getElementById('music-iframe');
        
        panel.classList.toggle('open');
        
        if (panel.classList.contains('open') && (!iframe.src || iframe.src === 'about:blank')) {
            iframe.src = 'https://monochrome.tf';
        }
    }

    function closeMusicPanel() {
        const panel = document.getElementById('music-panel');
        panel.classList.remove('open');
    }

    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', 'true');
    }

    function openSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.remove('collapsed');
        document.body.classList.remove('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', 'false');
    }

    const savedState = localStorage.getItem('sidebarCollapsed');
    if (savedState === 'true') {
        if (document.getElementById('sidebar')) {
            document.getElementById('sidebar').classList.add('collapsed');
        }
        document.body.classList.add('sidebar-collapsed');
    }

    const currentPage = window.location.pathname;
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        const onclick = item.getAttribute('onclick');
        if (onclick && onclick.includes(currentPage)) {
            item.classList.add('active');
        }
    });
</script>
