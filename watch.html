<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.10.3/cdn.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000000; color: #e5e5e5; font-family: Arial, sans-serif; }
        button { background: #1a1a1a; padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s; margin: 5px; border: 1px solid #2a2a2a; }
        button:hover { background: #2a2a2a; }
        button.active { background: #3a3a3a; border-color: #555555; }
        .back-link { color: #888888; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .back-link:hover { color: #cccccc; }
        .popup-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            color: #e5e5e5;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            border: 1px solid #333333;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .info-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            color: #888888;
            font-size: 14px;
        }
        
        .rating {
            color: #ffd700;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #888888;
        }
        
        .video-container {
            background: #0a0a0a;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 1px solid #1a1a1a;
            position: relative;
            transition: all 0.2s;
        }
        
        .season-episode-container {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #1a1a1a;
        }
        
        .overview-container {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #1a1a1a;
        }
        
        h1 {
            color: white;
        }
        
        h3 {
            color: #e5e5e5;
            font-weight: 600;
        }
        
        .zoom-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            border: 1px solid #555;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .zoom-btn:hover {
            background: rgba(0,0,0,0.9);
            border-color: #888;
        }
        
        .video-container.zoom-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            margin: 0 !important;
            border-radius: 0 !important;
        }
        
        .video-container.zoom-mode .relative {
            height: 100vh !important;
            padding-top: 0 !important;
        }
        
        .video-container.zoom-mode iframe {
            height: 100% !important;
            width: 100% !important;
        }
        
        .source-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .source-dropbtn {
            background: #1a1a1a;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #333;
            font-size: 14px;
        }
        
        .source-dropbtn:hover {
            background: #2a2a2a;
        }
        
        .source-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: #1a1a1a;
            min-width: 120px;
            border-radius: 12px;
            border: 1px solid #333;
            z-index: 100;
        }
        
        .source-dropdown-content div {
            color: white;
            padding: 8px 16px;
            cursor: pointer;
        }
        
        .source-dropdown-content div:hover {
            background: #2a2a2a;
            border-radius: 12px;
        }
        
        .source-dropdown:hover .source-dropdown-content {
            display: block;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .season-select {
            background: #1a1a1a;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .season-select option {
            background: #1a1a1a;
            color: white;
        }
        
        .episodes-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 220px;
            overflow-y: auto;
        }
        
        .episode-card {
            background: #111111;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2a2a2a;
        }
        
        .episode-card:hover {
            background: #1a1a1a;
            border-color: #444;
        }
        
        .episode-card.active {
            background: #1a2a1a;
            border-color: #4caf50;
        }
        
        .episode-title-line {
            font-size: 15px;
            font-weight: bold;
            color: white;
            margin-bottom: 6px;
        }
        
        .episode-number {
            color: #4caf50;
        }
        
        .episode-name {
            color: white;
        }
        
        .episode-overview {
            font-size: 12px;
            color: #aaa;
            line-height: 1.3;
        }
        
        .loading-episodes {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        
        .season-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .season-label {
            color: #888;
            font-size: 13px;
        }
        
        .episodes-grid::-webkit-scrollbar {
            width: 6px;
        }
        
        .episodes-grid::-webkit-scrollbar-track {
            background: #111;
            border-radius: 10px;
        }
        
        .episodes-grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen p-8" style="background: #000000;" x-data="app()">
    <div class="container mx-auto max-w-6xl">
        
        <div class="top-bar">
            <a href="movies.html" class="back-link">← Back to Browse</a>
            
            <div class="source-dropdown">
                <div class="source-dropbtn" x-text="'Source: ' + currentSourceName"></div>
                <div class="source-dropdown-content">
                    <template x-for="source in sources" :key="source.id">
                        <div @click="selectedSource = source.id; updateVideoUrl()" x-text="source.name"></div>
                    </template>
                </div>
            </div>
        </div>
        
        <div x-show="content">
            <h1 class="text-4xl font-bold mb-2" x-text="content?.title || content?.name"></h1>
            
            <div class="info-row" x-show="contentType === 'tv'">
                <span x-text="content?.first_air_date?.split('-')[0] || 'N/A'"></span>
                <span class="rating" x-text="'★ ' + (content?.vote_average?.toFixed(1) || 'N/A')"></span>
            </div>
            
            <div class="info-row" x-show="contentType === 'movie'">
                <span x-text="content?.release_date?.split('-')[0] || 'N/A'"></span>
                <span class="rating" x-text="'★ ' + (content?.vote_average?.toFixed(1) || 'N/A')"></span>
            </div>
            
            <div class="video-container" x-ref="videoContainer">
                <div class="relative pt-[56.25%]">
                    <iframe :src="currentVideoUrl" 
                            x-ref="videoIframe"
                            class="absolute top-0 left-0 w-full h-full" 
                            frameborder="0" 
                            allow="fullscreen"
                            allowfullscreen>
                    </iframe>
                </div>
                <button class="zoom-btn" @click="toggleZoom">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
            </div>

            <div class="season-episode-container" x-show="contentType === 'tv' && seasons.length > 0">
                <div class="season-row">
                    <span class="season-label">Season:</span>
                    <select class="season-select" x-model="selectedSeason" @change="seasonChanged">
                        <template x-for="season in seasons" :key="season.season_number">
                            <option :value="season.season_number" x-text="'S' + season.season_number"></option>
                        </template>
                    </select>
                </div>
                
                <div x-show="episodesLoading" class="loading-episodes">Loading episodes...</div>
                
                <div x-show="!episodesLoading && episodes.length > 0" class="episodes-grid">
                    <template x-for="episode in episodes" :key="episode.episode_number">
                        <div @click="selectEpisode(episode.episode_number)"
                            class="episode-card"
                            :class="selectedEpisode === episode.episode_number ? 'active' : ''">
                            <div class="episode-title-line">
                                <span class="episode-number" x-text="'E' + episode.episode_number + ' '"></span>
                                <span class="episode-name" x-text="episode.name"></span>
                            </div>
                            <div class="episode-overview" x-text="episode.overview ? episode.overview.substring(0, 120) + '...' : 'No description available.'"></div>
                        </div>
                    </template>
                </div>
                
                <div x-show="!episodesLoading && episodes.length === 0" class="loading-episodes">
                    No episodes found for this season.
                </div>
            </div>

            <div class="overview-container">
                <h3 class="text-xl font-semibold mb-4">Overview</h3>
                <p class="text-gray-400" x-text="content?.overview"></p>
            </div>
        </div>
    </div>

    <script>
        const sources = [
            { id: 'vidlink', name: 'VidLink', urls: { movie: 'https://vidlink.pro/movie/{id}', tv: 'https://vidlink.pro/tv/{id}/{season}/{episode}' } },
            { id: 'videasy', name: 'VidEasy', urls: { movie: 'https://player.videasy.net/movie/{id}?color=8834ec', tv: 'https://player.videasy.net/tv/{id}/{season}/{episode}?color=8834ec' } },
            { id: 'vidora', name: 'Vidora', urls: { movie: 'https://vidora.su/movie/{id}', tv: 'https://vidora.su/tv/{id}/{season}/{episode}' } }
        ];

        let popupBlockCount = 0;

        const adNetworkDomains = [
            'doubleclick.net', 'googleadservices.com', 'googlesyndication.com',
            'exoclick.com', 'popads.net', 'adsterra.com', 'intellipopup.com',
            'imasdk.googleapis.com',
            'oundhertobeconsist.org',
            'continue-download.com',
            'continue2download.com',
            'ouraidream.com',
            'zsjqcvphoansc.com',
            'bfvbaujlrhlep.com',
            'siophientic.com',
            'bestadblocker.net',
            'wickedsetup.com',
            'allideasofanime.com',
            'ey43.com',
            'stake.us',
            'stake.com',
            'vivint.com',
            'bitspay.io',
            'kiaughdinning.qpon',
            'casino',
            'gambling',
            'poker',
            'blackjack',
            'roulette',
            'slot',
            'betting',
            'sportsbook',
            'vegas',
            'lottery',
            'jackpot',
            'bingo',
            'baccarat',
            'odds',
            'wager',
            'bookmaker',
            'bet365',
            'draftkings',
            'fanduel',
            'williamhill',
            '888casino',
            'betway',
            'unibet',
            'partypoker',
            'pokerstars',
            'betfair',
            'lust',
            'goddess',
            'adult',
            'porn',
            'xxx',
            'sex',
            'nude',
            'naked',
            'onlyfans'
        ];

        const blockedPatterns = [
            'go.php', 'click.php', 'redirect', 'adclick', 'adserver', 'tracking',
            'affiliate', 'out.php', 'c.php', 'link.php', 'visit.php', 'exid=',
            'afu.php', 'zoneid=', 'smart-deter', 'gdn/security', 'wonderlp1.html',
            'wonderoffer.html', 'api/users', 'token=', 'qpon', 'popunder', 'popup',
            'recommended.html', 'continue.html'
        ];

        function isAdNetworkUrl(url) {
            if (!url) return false;
            const lower = url.toLowerCase();
            if (adNetworkDomains.some(domain => lower.includes(domain))) return true;
            if (blockedPatterns.some(pattern => lower.includes(pattern))) return true;
            return false;
        }

        function showPopupToast() {
            popupBlockCount++;
            let toast = document.querySelector('.popup-toast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'popup-toast';
            toast.innerHTML = `🚫 Blocked ${popupBlockCount} popup${popupBlockCount !== 1 ? 's' : ''}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.open = function() { showPopupToast(); return null; };

        document.addEventListener('click', function(e) {
            let target = e.target.closest('a');
            if (target && target.target === '_blank') {
                let href = target.href || '';
                if (isAdNetworkUrl(href)) {
                    e.preventDefault();
                    e.stopPropagation();
                    showPopupToast();
                    return false;
                }
            }
            if (target && target.href && isAdNetworkUrl(target.href)) {
                e.preventDefault();
                e.stopPropagation();
                showPopupToast();
                return false;
            }
        }, true);

        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            const url = typeof input === 'string' ? input : (input && input.url) || '';
            if (isAdNetworkUrl(url)) {
                showPopupToast();
                return Promise.reject(new Error('Blocked ad network request'));
            }
            return originalFetch.apply(this, arguments);
        };

        const originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            if (isAdNetworkUrl(url)) {
                showPopupToast();
                arguments[1] = 'about:blank';
            }
            return originalXHROpen.apply(this, arguments);
        };

        const adBlockerStyle = document.createElement('style');
        adBlockerStyle.textContent = `
            [class*="ad"]:not([class*="video"]):not([class*="load"]):not([class*="player"]),
            [id*="ad"]:not([id*="video"]):not([id*="load"]):not([id*="player"]),
            [class*="popup"], [id*="popup"],
            [class*="banner"]:not([class*="video"]),
            .vjs-ad-overlay, .ima-ad-container,
            iframe[src*="doubleclick"], iframe[src*="googlead"],
            iframe[src*="exoclick"], iframe[src*="popads"],
            iframe[src*="intellipopup"], iframe[src*="bestadblocker"],
            iframe[src*="oundhertobeconsist"], iframe[src*="continue2download"],
            .jw-ad, .jwplayer-ad, ins.adsbygoogle,
            .video-ads, .preroll-ads, .midroll-ads {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
                width: 0 !important;
                height: 0 !important;
            }
        `;
        document.head.appendChild(adBlockerStyle);

        function app() {
            return {
                apiKey: 'fb7bb23f03b6994dafc674c074d01761',
                content: null,
                contentId: null,
                contentType: null,
                selectedSource: 'vidlink',
                sources: sources,
                currentVideoUrl: '',
                popupInterval: null,
                selectedSeason: 1,
                selectedEpisode: 1,
                seasons: [],
                episodes: [],
                episodesLoading: false,

                get currentSourceName() {
                    const source = this.sources.find(s => s.id === this.selectedSource);
                    return source ? source.name : 'VidLink';
                },

                async init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    this.contentId = urlParams.get('id');
                    this.contentType = urlParams.get('type');
                    
                    if (this.contentId && this.contentType) {
                        await this.fetchContent();
                        if (this.contentType === 'tv') {
                            await this.fetchSeasons();
                        }
                        this.updateVideoUrl();
                    }
                    
                    this.startIframeCleanup();
                    
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') {
                            this.exitZoom();
                        }
                    });
                },
                
                async seasonChanged() {
                    await this.fetchEpisodes();
                },
                
                toggleZoom() {
                    const container = this.$refs.videoContainer;
                    if (!container.classList.contains('zoom-mode')) {
                        container.classList.add('zoom-mode');
                        document.body.style.overflow = 'hidden';
                    }
                },
                
                exitZoom() {
                    const container = this.$refs.videoContainer;
                    container.classList.remove('zoom-mode');
                    document.body.style.overflow = '';
                },
                
                startIframeCleanup() {
                    this.popupInterval = setInterval(() => {
                        this.cleanIframe();
                    }, 500);
                },
                
                cleanIframe() {
                    try {
                        const iframe = this.$refs.videoIframe;
                        if (!iframe) return;
                        
                        const iframeWindow = iframe.contentWindow;
                        const iframeDoc = iframe.contentDocument || iframeWindow?.document;
                        if (iframeWindow) {
                            iframeWindow.open = function() { showPopupToast(); return null; };
                            iframeWindow.alert = function() {};
                            iframeWindow.confirm = function() { return false; };
                        }
                        
                        if (iframeDoc && !iframeDoc.querySelector('style[data-adblock]')) {
                            const iframeStyle = iframeDoc.createElement('style');
                            iframeStyle.setAttribute('data-adblock', '1');
                            iframeStyle.textContent = `
                                [class*="ad"]:not([class*="video"]), [id*="ad"]:not([id*="video"]),
                                [class*="popup"], [id*="popup"], .ima-ad-container,
                                iframe[src*="doubleclick"], iframe[src*="googlead"],
                                iframe[src*="exoclick"], iframe[src*="popads"],
                                iframe[src*="oundhertobeconsist"], iframe[src*="continue2download"] {
                                    display: none !important;
                                    visibility: hidden !important;
                                    opacity: 0 !important;
                                    pointer-events: none !important;
                                }
                            `;
                            iframeDoc.head.appendChild(iframeStyle);
                        }
                    } catch(e) {}
                },

                async fetchContent() {
                    const url = `https://api.themoviedb.org/3/${this.contentType}/${this.contentId}?api_key=${this.apiKey}`;
                    try {
                        const response = await fetch(url);
                        this.content = await response.json();
                    } catch (error) {
                        console.error('Error fetching content:', error);
                    }
                },

                async fetchSeasons() {
                    const url = `https://api.themoviedb.org/3/tv/${this.contentId}?api_key=${this.apiKey}`;
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        this.seasons = data.seasons.filter(s => s.season_number > 0);
                        if (this.seasons.length > 0) {
                            this.selectedSeason = this.seasons[0].season_number;
                            await this.fetchEpisodes();
                        }
                    } catch (error) {
                        console.error('Error fetching seasons:', error);
                    }
                },

                async fetchEpisodes() {
                    this.episodesLoading = true;
                    const url = `https://api.themoviedb.org/3/tv/${this.contentId}/season/${this.selectedSeason}?api_key=${this.apiKey}`;
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        this.episodes = data.episodes;
                        if (this.episodes.length > 0) {
                            this.selectedEpisode = this.episodes[0].episode_number;
                            this.updateVideoUrl();
                        }
                    } catch (error) {
                        console.error('Error fetching episodes:', error);
                    } finally {
                        this.episodesLoading = false;
                    }
                },

                selectEpisode(episodeNum) {
                    if (this.selectedEpisode === episodeNum) return;
                    this.selectedEpisode = episodeNum;
                    this.updateVideoUrl();
                },

                updateVideoUrl() {
                    const source = this.sources.find(s => s.id === this.selectedSource);
                    if (!source) return;
                    
                    let url;
                    if (this.contentType === 'movie') {
                        url = source.urls.movie.replace('{id}', this.contentId);
                    } else {
                        url = source.urls.tv
                            .replace('{id}', this.contentId)
                            .replace('{season}', this.selectedSeason)
                            .replace('{episode}', this.selectedEpisode);
                    }
                    
                    this.currentVideoUrl = url;
                    
                    setTimeout(() => this.cleanIframe(), 100);
                    setTimeout(() => this.cleanIframe(), 500);
                    setTimeout(() => this.cleanIframe(), 1000);
                    setTimeout(() => this.cleanIframe(), 2000);
                    setTimeout(() => this.cleanIframe(), 5000);
                },
                
                destroy() {
                    if (this.popupInterval) {
                        clearInterval(this.popupInterval);
                    }
                }
            }
        }
        
        window.addEventListener('beforeunload', () => {
            if (window.app && window.app.destroy) {
                window.app.destroy();
            }
        });
    </script>
</body>
</html>
