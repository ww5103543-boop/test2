<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No0ne</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .setup-card {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 500;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .sub {
            color: #666;
            font-size: 14px;
            margin-bottom: 40px;
        }
        
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #555;
        }
        
        input.error {
            border-color: #ff4444;
        }
        
        .error-msg {
            color: #ff4444;
            font-size: 11px;
            margin-top: 6px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        button {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 14px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #222;
            border-color: #555;
        }
        
        .hint {
            font-size: 11px;
            color: #555;
            margin-top: 8px;
        }
        
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
        .success {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            animation: fadeOut 0.3s ease 1s forwards;
        }
        
        .success.active {
            display: flex;
        }
        
        .check {
            font-size: 48px;
            color: #00ffa6;
        }
        
        .success p {
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <h1>No0ne</h1>
        <div class="sub">Create your display name</div>
        
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" id="username" placeholder="Enter username" maxlength="20" autocomplete="off">
            <div class="error-msg" id="usernameError"></div>
        </div>
        
        <button id="submitBtn" onclick="createProfile()">Start No0ne</button>
        
        <div class="hint">This will be your display name</div>
    </div>
    
    <div id="success" class="success">
        <div class="check">✓</div>
        <p>Welcome to No0ne</p>
    </div>

    <script>
        const badWords = [
            'fuck', 'shit', 'ass', 'bitch', 'cunt', 'dick', 'pussy', 'cock',
            'whore', 'slut', 'bastard', 'damn', 'nigger', 'chink', 'fag',
            'faggot', 'retard', 'rape', 'penis', 'vagina', 'sex', 'porn',
            'xxx', 'nude', 'naked', 'kill', 'murder', 'hitler', 'nazi',
            'kike', 'cracker', 'spic', 'gook', 'nigga', 'clit', 'tits',
            'boobs', 'butt', 'anal', 'cum', 'semen', 'molest', 'pedo'
        ];
        
        const leetMap = {
            '0': 'o', '1': 'i', '2': 'z', '3': 'e', '4': 'a', '5': 's',
            '6': 'g', '7': 't', '8': 'b', '9': 'g', '@': 'a', '$': 's',
            '!': 'i', '+': 't', '5': 's', '4': 'a', '3': 'e', '1': 'i',
            '0': 'o', '2': 'z', '7': 't', '8': 'b'
        };
        
        function normalize(text) {
            let normalized = text.toLowerCase();
           
            for (let [leet, letter] of Object.entries(leetMap)) {
                normalized = normalized.split(leet).join(letter);
            }
            normalized = normalized.replace(/[^a-z]/g, '');
            return normalized;
        }
        
        function containsBadWord(text) {
            if (!text) return false;
            const lowerText = text.toLowerCase();
            const normalized = normalize(text);
            
            for (const word of badWords) {
               
                if (lowerText.includes(word)) {
                    return true;
                }
    
                if (normalized.includes(word)) {
                    return true;
                }
                
                if (lowerText.indexOf(word) !== -1) {
                    return true;
                }
                if (normalized.indexOf(word) !== -1) {
                    return true;
                }
            }
            return false;
        }
        
        document.getElementById('username').addEventListener('input', function() {
            const error = document.getElementById('usernameError');
            error.classList.remove('show');
            this.classList.remove('error');
        });
        
        function createProfile() {
            const username = document.getElementById('username').value.trim();
            const errorDiv = document.getElementById('usernameError');
            
            if (!username) {
                errorDiv.textContent = 'Username is required';
                errorDiv.classList.add('show');
                document.getElementById('username').classList.add('error');
                return;
            }
            
            if (username.length < 3) {
                errorDiv.textContent = 'Username must be at least 3 characters';
                errorDiv.classList.add('show');
                document.getElementById('username').classList.add('error');
                return;
            }
            
            if (username.length > 20) {
                errorDiv.textContent = 'Username must be less than 20 characters';
                errorDiv.classList.add('show');
                document.getElementById('username').classList.add('error');
                return;
            }
            
            if (containsBadWord(username)) {
                errorDiv.textContent = 'Username contains inappropriate language';
                errorDiv.classList.add('show');
                document.getElementById('username').classList.add('error');
                return;
            }
            
            const profile = {
                username: username,
                createdAt: new Date().toISOString(),
                lastSeen: new Date().toISOString()
            };
            
            localStorage.setItem('noone_profile', JSON.stringify(profile));
            localStorage.setItem('noone_setup_done', 'true');
            
            const successDiv = document.getElementById('success');
            successDiv.classList.add('active');
            
            setTimeout(() => {
                window.location.href = '/';
            }, 1300);
        }
        
        if (localStorage.getItem('noone_setup_done') === 'true') {
            window.location.href = '/';
        }
    </script>
</body>
</html>
