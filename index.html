   <script>
      const profile = JSON.parse(localStorage.getItem('noone_profile') || '{}');
      const username = profile.username || 'Guest';
      
      const hostname = window.location.hostname;
      const isDev = hostname === 'willybilly4653.mathpraticee.pro';
      
      if (isDev) {
         localStorage.setItem('devmode', 'true');
         console.log('DEV MODE ACTIVE');
      }
      
      const devMode = localStorage.getItem('devmode') === 'true';
      
      document.addEventListener('DOMContentLoaded', function() {
         const msg = document.createElement('div');
         msg.textContent = `Welcome ${username}`;
         msg.style.cssText = `
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: 500;
            z-index: 10000;
            opacity: 1;
            transition: opacity 1s ease;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
         `;
         document.body.appendChild(msg);
         setTimeout(() => {
            msg.style.opacity = '0';
            setTimeout(() => msg.remove(), 1000);
         }, 2000);
         
         if (devMode) {
            setTimeout(() => {
               const sidebar = document.getElementById('sidebar');
               const musicItem = document.getElementById('nav-music');
               if (sidebar && musicItem) {
                  const devNav = document.createElement('div');
                  devNav.className = 'nav-item';
                  devNav.id = 'nav-dev';
                  devNav.title = 'Dev Tools';
                  devNav.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>`;
                  devNav.onclick = () => openDevPanel();
                  musicItem.insertAdjacentElement('afterend', devNav);
               }
               
               const devPanel = document.createElement('div');
               devPanel.id = 'dev-panel';
               devPanel.innerHTML = `
                  <div class="dev-panel-header">
                     <span>Dev Panel</span>
                     <button onclick="closeDevPanel()">X</button>
                  </div>
                  <div class="dev-panel-content">
                     <div class="dev-section">
                        <h4>Active Users</h4>
                        <div id="activeUsersList">Loading...</div>
                     </div>
                     <div class="dev-section">
                        <h4>Add Game</h4>
                        <input type="text" id="newGameName" placeholder="Game name">
                        <input type="text" id="newGameUrl" placeholder="Game URL">
                        <button onclick="addGame()">Add Game</button>
                     </div>
                     <div class="dev-section">
                        <h4>Add Movie</h4>
                        <input type="text" id="newMovieName" placeholder="Movie name">
                        <input type="text" id="newMovieUrl" placeholder="Movie URL">
                        <button onclick="addMovie()">Add Movie</button>
                     </div>
                     <div class="dev-section">
                        <h4>Actions</h4>
                        <button onclick="clearCache()">Clear Cache</button>
                        <button onclick="reloadConfig()">Reload Config</button>
                     </div>
                  </div>
               `;
               devPanel.style.cssText = `
                  position: fixed;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                  width: 400px;
                  background: #1a1a1a;
                  border: 1px solid #ff4444;
                  border-radius: 12px;
                  z-index: 20000;
                  display: none;
                  flex-direction: column;
                  box-shadow: 0 0 20px rgba(255,68,68,0.3);
               `;
               document.body.appendChild(devPanel);
            }, 500);
         }
      });
      
      function openDevPanel() {
         const panel = document.getElementById('dev-panel');
         if (panel) {
            panel.style.display = 'flex';
            updateActiveUsers();
         }
      }
      
      function closeDevPanel() {
         const panel = document.getElementById('dev-panel');
         if (panel) panel.style.display = 'none';
      }
      
      function updateActiveUsers() {
         const profiles = JSON.parse(localStorage.getItem('noone_profiles') || '[]');
         const list = document.getElementById('activeUsersList');
         if (list) {
            if (profiles.length === 0) {
               list.innerHTML = '<div style="color:#888; font-size:12px;">No active users</div>';
            } else {
               list.innerHTML = profiles.map(p => `<div style="padding:4px 0; border-bottom:1px solid #333;">${p.username}</div>`).join('');
            }
         }
      }
      
      function addGame() {
         const name = document.getElementById('newGameName')?.value;
         const url = document.getElementById('newGameUrl')?.value;
         if (name && url) {
            let games = JSON.parse(localStorage.getItem('custom_games') || '[]');
            games.push({ name, url });
            localStorage.setItem('custom_games', JSON.stringify(games));
            alert(`Game ${name} added`);
            document.getElementById('newGameName').value = '';
            document.getElementById('newGameUrl').value = '';
         } else {
            alert('Please enter both name and URL');
         }
      }
      
      function addMovie() {
         const name = document.getElementById('newMovieName')?.value;
         const url = document.getElementById('newMovieUrl')?.value;
         if (name && url) {
            let movies = JSON.parse(localStorage.getItem('custom_movies') || '[]');
            movies.push({ name, url });
            localStorage.setItem('custom_movies', JSON.stringify(movies));
            alert(`Movie ${name} added`);
            document.getElementById('newMovieName').value = '';
            document.getElementById('newMovieUrl').value = '';
         } else {
            alert('Please enter both name and URL');
         }
      }
      
      function clearCache() {
         localStorage.removeItem('noone_profiles');
         localStorage.removeItem('custom_games');
         localStorage.removeItem('custom_movies');
         alert('Cache cleared');
      }
      
      function reloadConfig() {
         window.location.reload();
      }
   </script>

      import { setTransport, setWisp, getProxied } from "./ximplesc/ximple.mjs";

      setWisp("wss://wisp.mercurywork.shop/");
      setTransport("epoxy");

      const initOverlay = document.getElementById('init-overlay');
      const initMsg = document.getElementById('init-msg');
      const iframe = document.getElementById('iframeid');
      const urlBar = document.getElementById('url-bar');
      const homePage = document.getElementById('home-page');
      const browserView = document.getElementById('browser-view');
      const homeSearch = document.getElementById('home-search');
      const loadingBar = document.getElementById('loadingbar');
      const topBar = document.getElementById('top-bar');
      const showTopBarBtn = document.getElementById('show-top-bar');
      const shortcutsGrid = document.getElementById('shortcuts-grid');
      const modalOverlay = document.getElementById('modal-overlay');
      const settingsOverlay = document.getElementById('settings-overlay');
      const currentSearchBadge = document.getElementById('current-search-badge');
      const statusMsg = document.getElementById('statusMsg');
      const musicPanel = document.getElementById('music-panel');
      const musicIframe = document.getElementById('music-iframe');

      let lastURL = '';
      let loadTimeout;
      let navigationInProgress = false;
      let currentView = 'proxy';

      window.toggleMusic = function() {
         musicPanel.classList.toggle('open');
      };

      window.closeMusic = function() {
         musicPanel.classList.remove('open');
      };

      function waitForScramjet() {
         return new Promise(r => { const c = () => window.scramjet ? r() : setTimeout(c, 50); c(); });
      }

      async function waitForSWController() {
         if (!navigator.serviceWorker) return;
         await navigator.serviceWorker.ready;
         if (!navigator.serviceWorker.controller) {
            await new Promise(r => navigator.serviceWorker.addEventListener("controllerchange", r, { once: true }));
         }
      }

      initMsg.textContent = "Waiting for service worker...";
      await waitForSWController();
      initMsg.textContent = "Initializing scramjet...";
      await waitForScramjet();
      initOverlay.classList.add('gone');
      setTimeout(() => initOverlay.remove(), 500);

      window.switchView = function(view) {
         currentView = view;

         document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
         document.getElementById('nav-' + view).classList.add('active');

         homePage.style.display = 'none';
         browserView.style.display = 'none';

         if (view === 'proxy') {
            homePage.style.display = 'flex';
         } else if (view === 'games') {
            browserView.style.display = 'block';
            iframe.src = '/games';
         }
      };

      const searchEngines = {
         brave: {
            name: 'Brave',
            url: 'https://search.brave.com/search?q=',
            badge: 'Brave'
         },
         duckduckgo: {
            name: 'DuckDuckGo',
            url: 'https://duckduckgo.com/?q=',
            badge: 'DuckDuckGo'
         }
      };

      let currentSearchEngine = localStorage.getItem('searchEngine') || 'brave';

      let panicSettings = {
         shortcut: localStorage.getItem('panicShortcut') || 'Ctrl+X',
         url: localStorage.getItem('panicUrl') || 'https://clever.com'
      };

      function showStatus(message, isError = false) {
         statusMsg.textContent = message;
         statusMsg.style.background = isError ? 'rgba(80, 40, 40, 0.95)' : 'rgba(30, 30, 30, 0.95)';
         statusMsg.classList.add('show');
         setTimeout(() => {
            statusMsg.classList.remove('show');
         }, 2000);
      }

      function updateSearchEngineUI(engine) {
         const searchValue = document.getElementById('searchEngineValue');
         if (searchValue) {
            searchValue.textContent = searchEngines[engine].name;
         }
         homeSearch.placeholder = `Search with ${searchEngines[engine].name}`;
         currentSearchBadge.textContent = searchEngines[engine].badge;
         localStorage.setItem('searchEngine', engine);
         // Update URL bar placeholder based on search engine
         urlBar.placeholder = `Search ${searchEngines[engine].name} or enter URL...`;
      }

      window.selectSearchEngine = function(engine) {
         currentSearchEngine = engine;
         updateSearchEngineUI(engine);
         document.getElementById('searchDropdown').classList.remove('show');
         showStatus('Search engine saved');
      };

      window.toggleSearchDropdown = function() {
         const dropdown = document.getElementById('searchDropdown');
         dropdown.classList.toggle('show');
      };

      let currentTransport = localStorage.getItem('transport') || 'libcurl';

      function updateTransportUI(transport) {
         const transportValue = document.getElementById('transportValue');
         if (transportValue) {
            transportValue.textContent = transport;
         }
         localStorage.setItem('transport', transport);
         setTransport(transport);
      }

      window.selectTransport = function(transport) {
         currentTransport = transport;
         updateTransportUI(transport);
         document.getElementById('transportDropdown').classList.remove('show');
         showStatus('Transport saved. Reloading...');
         setTimeout(() => {
            window.location.reload();
         }, 1000);
      };

      window.toggleTransportDropdown = function() {
         const dropdown = document.getElementById('transportDropdown');
         dropdown.classList.toggle('show');
      };

      window.saveWispServer = function() {
         const wispInput = document.getElementById('wispServerInput');
         let wispUrl = wispInput.value.trim();
         if (!wispUrl.startsWith('ws://') && !wispUrl.startsWith('wss://')) {
            wispUrl = 'wss://' + wispUrl;
            wispInput.value = wispUrl;
         }
         localStorage.setItem('wispServer', wispUrl);
         setWisp(wispUrl);
         showStatus('Wisp server saved. Reloading...');
         setTimeout(() => {
            window.location.reload();
         }, 1000);
      };

      function loadSavedWispServer() {
         const savedWisp = localStorage.getItem('wispServer');
         if (savedWisp) {
            const wispInput = document.getElementById('wispServerInput');
            if (wispInput) {
               wispInput.value = savedWisp;
            }
            setWisp(savedWisp);
         }
      }

      window.openSettings = function() {
         updateSearchEngineUI(currentSearchEngine);
         document.getElementById('panicShortcut').value = panicSettings.shortcut;
         document.getElementById('panicUrl').value = panicSettings.url;
         const transportValue = document.getElementById('transportValue');
         if (transportValue) {
            transportValue.textContent = currentTransport;
         }
         loadSavedWispServer();
         settingsOverlay.classList.add('visible');
      };

      window.closeSettings = function(event) {
         if (!event || event.target === settingsOverlay || event.target.classList.contains('close-settings')) {
            settingsOverlay.classList.remove('visible');
            document.getElementById('searchDropdown')?.classList.remove('show');
            document.getElementById('transportDropdown')?.classList.remove('show');
         }
      };

      window.savePanicSettings = function() {
         let newShortcut = document.getElementById('panicShortcut').value.trim();
         let newUrl = document.getElementById('panicUrl').value.trim();
         if (!newShortcut) newShortcut = 'Ctrl+X';
         if (!newUrl) newUrl = 'https://clever.com';
         if (!newUrl.startsWith('http://') && !newUrl.startsWith('https://')) {
            newUrl = 'https://' + newUrl;
            document.getElementById('panicUrl').value = newUrl;
         }
         panicSettings.shortcut = newShortcut;
         panicSettings.url = newUrl;
         localStorage.setItem('panicShortcut', panicSettings.shortcut);
         localStorage.setItem('panicUrl', panicSettings.url);
         showStatus('Panic settings saved');
      };

      function parseKeyCombo(e) {
         const key = e.key === ' ' ? 'Space' : e.key;
         const parts = [];
         if (e.ctrlKey) parts.push('Ctrl');
         if (e.altKey) parts.push('Alt');
         if (e.shiftKey) parts.push('Shift');
         if (e.metaKey) parts.push('Meta');
         if (key && !['Control', 'Alt', 'Shift', 'Meta'].includes(key)) {
            parts.push(key.length === 1 ? key.toUpperCase() : key);
         }
         return parts.join('+');
      }

      let panicIframeActive = false;
      let panicIframe = null;
      let panicOriginalDisplay = {};
      let panicTransitionLock = false;

      document.addEventListener('keydown', function(e) {
         const combo = parseKeyCombo(e);
         if (combo === panicSettings.shortcut) {
            e.preventDefault();
            e.stopPropagation();
            if (panicTransitionLock) return;
            panicTransitionLock = true;
            try {
               if (!panicIframeActive) {
                  showStatus('Panic mode activated');
                  panicOriginalDisplay = {
                     topBar: topBar.style.display || '',
                     homePage: homePage.style.display || '',
                     browserView: browserView.style.display || '',
                     showTopBarBtn: showTopBarBtn.style.display || ''
                  };
                  topBar.style.display = 'none';
                  homePage.style.display = 'none';
                  browserView.style.display = 'none';
                  showTopBarBtn.style.display = 'none';
                  loadingBar.style.display = 'none';
                  const existingIframe = document.getElementById('panic-iframe');
                  if (existingIframe) existingIframe.remove();
                  panicIframe = document.createElement('iframe');
                  panicIframe.id = 'panic-iframe';
                  panicIframe.style.cssText = `position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;z-index:10000;background:white;`;
                  document.body.appendChild(panicIframe);
                  getProxied(panicSettings.url).then(function(proxiedPanicUrl) {
                     if (panicIframe) panicIframe.src = proxiedPanicUrl;
                  }).catch(function(err) {
                     console.error('Failed to load panic URL:', err);
                  });
                  panicIframeActive = true;
                  setTimeout(function() { panicTransitionLock = false; }, 300);
               } else {
                  showStatus('Returning to proxy...');
                  if (panicIframe && panicIframe.parentNode) panicIframe.parentNode.removeChild(panicIframe);
                  panicIframe = null;
                  topBar.style.display = panicOriginalDisplay.topBar || '';
                  showTopBarBtn.style.display = panicOriginalDisplay.showTopBarBtn || 'none';
                  loadingBar.style.display = '';
                  if (panicOriginalDisplay.browserView === 'block') {
                     browserView.style.display = 'block';
                     homePage.style.display = 'none';
                  } else {
                     browserView.style.display = 'none';
                     homePage.style.display = 'flex';
                  }
                  panicIframeActive = false;
                  setTimeout(function() { panicTransitionLock = false; }, 300);
               }
            } catch (err) {
               console.error('Panic key error:', err);
               panicTransitionLock = false;
            }
         }
      });

      document.addEventListener('click', function(e) {
         if (!e.target.closest('.dropdown-list')) {
            document.getElementById('searchDropdown')?.classList.remove('show');
            document.getElementById('transportDropdown')?.classList.remove('show');
         }
      });

      const defaultShortcuts = [
         { name: 'tiktok', url: 'https://tiktok.com', icon: 'https://sf-static.tiktokcdn.com/obj/eden-sg/uhtyvueh7nulogpoguhm/tiktok-icon2.png', displayUrl: '' },
         { name: 'GitHub Search', url: 'https://github.com/search?q=&type=repositories', icon: 'https://github.com/favicon.ico', displayUrl: 'github.com/search' }
      ];

      let shortcuts = JSON.parse(localStorage.getItem('shortcuts')) || defaultShortcuts;

      function saveShortcuts() { localStorage.setItem('shortcuts', JSON.stringify(shortcuts)); }

      function renderShortcuts() {
         shortcutsGrid.innerHTML = '';
         shortcuts.forEach((shortcut, index) => {
            const card = document.createElement('div');
            card.className = 'shortcut-card';
            card.setAttribute('data-index', index);
            card.innerHTML = `
               <div class="delete-shortcut" onclick="deleteShortcut(${index}, event)">×</div>
               <div class="shortcut-icon"><img src="${shortcut.icon}" alt="${shortcut.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23888\'%3E%3Cpath d=\'M3 9v6h4l5 5V4L7 9H3z\'/%3E%3C/svg%3E'"></div>
               <span class="shortcut-label">${shortcut.name}</span>
            `;
            card.addEventListener('click', (e) => {
               if (!e.target.classList.contains('delete-shortcut')) loadUrl(shortcut.url);
            });
            shortcutsGrid.appendChild(card);
         });
      }

      window.deleteShortcut = function(index, event) {
         event.stopPropagation();
         shortcuts.splice(index, 1);
         saveShortcuts();
         renderShortcuts();
      };

      window.openAddShortcutModal = function() {
         modalOverlay.classList.add('visible');
         document.getElementById('shortcut-name').value = '';
         document.getElementById('shortcut-url').value = '';
         document.getElementById('shortcut-icon').value = '';
         setTimeout(() => document.getElementById('shortcut-name').focus(), 100);
      };

      window.closeAddShortcutModal = function(event) {
         if (!event || event.target === modalOverlay) modalOverlay.classList.remove('visible');
      };

      window.addShortcut = function() {
         const name = document.getElementById('shortcut-name').value.trim();
         let url = document.getElementById('shortcut-url').value.trim();
         const icon = document.getElementById('shortcut-icon').value.trim();
         if (!name || !url) { alert('Please enter both name and URL'); return; }
         if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
         const newShortcut = { name: name, url: url, icon: icon || `https://${new URL(url).hostname}/favicon.ico`, displayUrl: new URL(url).hostname };
         shortcuts.push(newShortcut);
         saveShortcuts();
         renderShortcuts();
         window.closeAddShortcutModal();
      };

      function smartURL(input) {
         const s = input.trim();
         if (!s) return null;
         if (/^https?:\/\//i.test(s)) return s;
         const domainLike = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(s) && !s.includes(' ');
         if (domainLike) return 'https://' + s;
         return searchEngines[currentSearchEngine].url + encodeURIComponent(s);
      }

      function extractDisplayURL(frameHref) {
         try {
            const part = frameHref.split('/scramjet/')[1];
            return part ? decodeURIComponent(part) : '';
         } catch (e) { return ''; }
      }

      function showBrowser() {
         homePage.style.display = 'none';
         browserView.style.display = 'block';
      }

      window.goHome = function() {
         switchView('proxy');
         homePage.style.display = 'flex';
         browserView.style.display = 'none';
         urlBar.value = '';
         homeSearch.value = '';
         updateActiveTab({ isHome: true, title: 'New Tab', url: '' });
      };

      window.openGames = function() { switchView('games'); };
      window.reloadPage = function() { if (browserView.style.display === 'block') { iframe.src = iframe.src; showLoadingBar(); } };
      window.goBack = function() { if (browserView.style.display === 'block') { try { iframe.contentWindow.history.back(); showLoadingBar(); } catch(e) {} } };
      window.goForward = function() { if (browserView.style.display === 'block') { try { iframe.contentWindow.history.forward(); showLoadingBar(); } catch(e) {} } };
      window.showTopBar = function() { topBar.classList.remove('hidden'); showTopBarBtn.classList.remove('visible'); homePage.classList.remove('fullscreen'); browserView.classList.remove('fullscreen'); loadingBar.classList.remove('fullscreen'); };
      window.handleUrlBarKeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); const input = urlBar.value.trim(); if (input) loadNewPage(input); } };
      window.handleHomeSearchKeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); const input = homeSearch.value.trim(); if (input) loadNewPage(input); } };

      async function loadUrl(url) {
         if (!url) return;
         if (!url.startsWith('http')) url = 'https://' + url;
         const proxied = await getProxied(url);
         iframe.src = proxied;
         urlBar.value = url;
         showBrowser();
         showLoadingBar();
         navigationInProgress = true;
         updateActiveTab({ url, proxiedUrl: proxied, title: url.replace(/^https?:\/\//, '').split('/')[0], isHome: false });
      }

      async function loadNewPage(input) {
         if (!input) return;
         const url = smartURL(input);
         if (!url) return;
         const proxied = await getProxied(url);
         iframe.src = proxied;
         urlBar.value = url;
         showBrowser();
         showLoadingBar();
         navigationInProgress = true;
         updateActiveTab({ url, proxiedUrl: proxied, title: url.replace(/^https?:\/\//, '').split('/')[0], isHome: false });
      }

      function showLoadingBar() {
         loadingBar.style.width = '30%';
         loadingBar.style.opacity = '1';
         if (loadTimeout) clearTimeout(loadTimeout);
         loadTimeout = setTimeout(() => hideLoadingBar(), 10000);
      }

      function hideLoadingBar() {
         loadingBar.style.width = '100%';
         setTimeout(() => { loadingBar.style.opacity = '0'; loadingBar.style.width = '0'; }, 200);
      }

      function checkIframeURL() {
         if (browserView.style.display !== 'block') return;
         if (navigationInProgress) return;
         try {
            const currentURL = iframe.contentWindow.location.href;
            if (currentURL && currentURL !== lastURL && currentURL !== 'about:blank') {
               lastURL = currentURL;
               const displayUrl = extractDisplayURL(currentURL);
               if (displayUrl) urlBar.value = displayUrl;
            }
         } catch(e) {}
      }

      iframe.addEventListener('load', () => {
         hideLoadingBar();
         navigationInProgress = false;
         try {
            const currentURL = iframe.contentWindow.location.href;
            if (currentURL && currentURL !== 'about:blank') {
               lastURL = currentURL;
               const displayUrl = extractDisplayURL(currentURL);
               if (displayUrl) urlBar.value = displayUrl;
               const pageTitle = iframe.contentDocument && iframe.contentDocument.title;
               const labelTitle = pageTitle || displayUrl || 'Page';
               updateActiveTab({ url: displayUrl || urlBar.value, proxiedUrl: currentURL, title: labelTitle.substring(0, 24), isHome: false });
            }
         } catch(e) {}
      });

      setInterval(checkIframeURL, 500);

      // ===== TABS SYSTEM =====
      let tabs = [];
      let activeTabId = null;
      let tabCounter = 0;
      function newTabId() { return ++tabCounter; }
      function getActiveTab() { return tabs.find(t => t.id === activeTabId) || null; }
      function renderTabs() {
         const list = document.getElementById('tabs-list'); list.innerHTML = '';
         tabs.forEach(tab => {
            const div = document.createElement('div'); div.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
            const titleEl = document.createElement('span'); titleEl.className = 'tab-title'; titleEl.textContent = tab.title;
            div.appendChild(titleEl);
            if (tabs.length > 1) {
               const closeEl = document.createElement('span'); closeEl.className = 'tab-close'; closeEl.textContent = '×';
               closeEl.addEventListener('click', (e) => { e.stopPropagation(); tabClose(tab.id); });
               div.appendChild(closeEl);
            }
            div.addEventListener('click', () => tabSwitch(tab.id));
            list.appendChild(div);
         });
         const active = list.querySelector('.tab.active'); if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
      }
      function saveCurrentTabState() {
         const tab = getActiveTab(); if (!tab) return;
         tab.url = urlBar.value; tab.isHome = (homePage.style.display !== 'none'); tab.proxiedUrl = tab.isHome ? '' : iframe.src;
      }
      function applyTabState(tab) {
         if (tab.isHome) { homePage.style.display = 'flex'; browserView.style.display = 'none'; urlBar.value = ''; } 
         else { homePage.style.display = 'none'; browserView.style.display = 'block'; urlBar.value = tab.url || ''; if (tab.proxiedUrl) iframe.src = tab.proxiedUrl; }
      }
      window.tabAdd = function() {
         saveCurrentTabState();
         const id = newTabId();
         tabs.push({ id, title: 'New Tab', url: '', isHome: true, proxiedUrl: '' });
         activeTabId = id;
         renderTabs();
         applyTabState(getActiveTab());
      };
      function tabClose(id) {
         if (tabs.length <= 1) return;
         const idx = tabs.findIndex(t => t.id === id); const wasActive = activeTabId === id;
         tabs.splice(idx, 1);
         if (wasActive) { const next = tabs[Math.min(idx, tabs.length - 1)]; activeTabId = next.id; applyTabState(next); }
         renderTabs();
      }
      function tabSwitch(id) {
         if (id === activeTabId) return;
         saveCurrentTabState(); activeTabId = id; applyTabState(getActiveTab()); renderTabs();
      }
      function updateActiveTab({ url, proxiedUrl, title, isHome } = {}) {
         const tab = getActiveTab(); if (!tab) return;
         if (url !== undefined) tab.url = url;
         if (proxiedUrl !== undefined) tab.proxiedUrl = proxiedUrl;
         if (isHome !== undefined) tab.isHome = isHome;
         if (title !== undefined) tab.title = title || tab.url || 'New Tab';
         renderTabs();
      }
      document.getElementById('new-tab-btn').addEventListener('click', window.tabAdd);
      const firstId = newTabId();
      tabs.push({ id: firstId, title: 'New Tab', url: '', isHome: true, proxiedUrl: '' });
      activeTabId = firstId;
      renderTabs();

      renderShortcuts();
      updateSearchEngineUI(currentSearchEngine);
      updateTransportUI(currentTransport);
      homeSearch.focus();
   </script>
</body>
<script>
   if ('serviceWorker' in navigator) {
       navigator.serviceWorker.getRegistrations().then(regs => {
           regs.forEach(r => r.unregister());
           console.log('Service workers disabled');
       });
   }
</script>
</html>
