<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>No0ne Movies</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.10.3/cdn.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            margin-left: 60px;
            transition: margin-left 0.3s ease;
        }

        body.sidebar-collapsed {
            margin-left: 0;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 100vh;
            background: rgba(17, 17, 17, 0.98);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(58, 58, 58, 0.5);
            display: flex;
            flex-direction: column;
            z-index: 1100;
            transition: width 0.3s ease;
            overflow: hidden;
        }

        #sidebar.collapsed {
            width: 0;
            border-right: none;
        }

        #sidebar.collapsed .close-sidebar-btn {
            display: none;
        }

        .close-sidebar-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(42, 42, 42, 0.8);
            border: 1px solid #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #999;
            font-size: 18px;
            z-index: 1200;
        }

        .close-sidebar-btn:hover {
            background: rgba(58, 58, 58, 0.9);
            color: #fff;
            transform: rotate(90deg);
        }

        .open-sidebar-btn {
            position: fixed;
            left: 10px;
            top: 10px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #333;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1100;
            transition: all 0.2s ease;
            color: white;
            font-size: 24px;
        }

        .open-sidebar-btn:hover {
            background: rgba(37, 37, 37, 0.95);
            border-color: #444;
            transform: scale(1.05);
        }

        body.sidebar-collapsed .open-sidebar-btn {
            display: flex;
        }

        .sidebar-logo {
            padding: 20px;
            text-align: center;
        }

        .sidebar-logo h2 {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
            color: #aaa;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-left-color: #fff;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .nav-item img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        #music-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(17, 17, 17, 0.98);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(58, 58, 58, 0.5);
            z-index: 1150;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        #music-panel.open {
            right: 0;
        }

        .music-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(58, 58, 58, 0.5);
        }

        .music-header h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .close-music {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(42, 42, 42, 0.8);
            border: 1px solid #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #999;
            font-size: 18px;
        }

        .close-music:hover {
            background: rgba(58, 58, 58, 0.9);
            color: #fff;
        }

        .music-iframe-container {
            flex: 1;
            position: relative;
        }

        #music-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0c0c0c;
        }

        .movie-card {
            transition: transform 0.2s;
            cursor: pointer;
            background: #141414;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222;
        }
        
        .movie-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border-color: #333;
        }
        
        input {
            background: #111;
            border: 1px solid #222;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            font-size: 16px;
            outline: none;
        }
        
        input:focus {
            border-color: #444;
            background: #1a1a1a;
        }
        
        input::placeholder {
            color: #555;
        }
        
        .filter-btn {
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid #222;
            background: #111;
            color: #aaa;
        }
        
        .filter-btn:hover {
            background: #1a1a1a;
            border-color: #333;
            color: #ddd;
        }
        
        .filter-btn-active {
            background: #222;
            color: white;
            border-color: #444;
        }
        
        .page-btn {
            background: #111;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #222;
            font-weight: 600;
            color: #aaa;
        }
        
        .page-btn:hover:not(:disabled) {
            background: #1a1a1a;
            border-color: #333;
            color: white;
        }
        
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .page-number {
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #222;
            color: #aaa;
        }
        
        .rating-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: #aaa;
        }
        
        .media-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .media-badge.movie {
            background: #1a1a1a;
            color: #aaa;
        }
        
        .media-badge.tv {
            background: #1a1a1a;
            color: #aaa;
        }
        
        .movie-card {
            position: relative;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        
        @media (max-width: 640px) {
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .title {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #555;
            font-size: 0.875rem;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="open-sidebar-btn" onclick="openSidebar()">☰</div>

    <div id="sidebar">
        <div class="close-sidebar-btn" onclick="closeSidebar()">×</div>
        <div class="sidebar-logo">
            <h2></h2>
        </div>
        
        <div class="nav-item" onclick="window.location.href='/'" id="nav-proxy" title="Proxy">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        
        <div class="nav-item active" onclick="window.location.href='/movies.html'" id="nav-movies" title="Movies">
            <img src="https://images.ctfassets.net/4cd45et68cgf/Rx83JoRDMkYNlMC9MKzcB/2b14d5a59fc3937afd3f03191e19502d/Netflix-Symbol.png?w=700&h=456" alt="Movies">
        </div>
        
        <div class="nav-item" onclick="window.location.href='/games.html'" id="nav-games" title="Games">
            <img src="http://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/b00-Store-Xbox-Gift-Card?ver=dd72" alt="Games">
        </div>
        
        <div class="nav-item" onclick="toggleMusicPanel()" id="nav-music" title="Music">
            <img src="https://www.scdn.co/i/_global/twitter_card-default.jpg" alt="Music">
        </div>
    </div>

    <div id="music-panel">
        <div class="music-header">
            <h3>music</h3>
            <div class="close-music" onclick="closeMusicPanel()">×</div>
        </div>
        <div class="music-iframe-container">
            <iframe id="music-iframe" src="https://monochrome.tf" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="container" x-data="app()">
        <div class="text-center mb-8">
            <h1 class="title">No0ne Movies</h1>
            <p class="subtitle">Stream movies and TV shows for free</p>
        </div>

        <div class="flex justify-center mb-8">
            <input type="text" x-model="searchQuery" @input="searchContent()" 
                   placeholder="Search for a movie or show..." class="w-full max-w-md">
        </div>

        <div class="flex justify-center gap-3 mb-8 flex-wrap">
            <button @click="currentTab = 'all'" 
                    :class="currentTab === 'all' ? 'filter-btn-active' : ''"
                    class="filter-btn">
                All
            </button>
            <button @click="currentTab = 'movies'" 
                    :class="currentTab === 'movies' ? 'filter-btn-active' : ''"
                    class="filter-btn">
                Movies
            </button>
            <button @click="currentTab = 'shows'" 
                    :class="currentTab === 'shows' ? 'filter-btn-active' : ''"
                    class="filter-btn">
                TV Shows
            </button>
        </div>

        <div class="content-grid">
            <template x-for="item in content" :key="item.id">
                <div @click="watchItem(item.id, item.media_type || currentTab)" class="movie-card">
                    <img :src="'https://image.tmdb.org/t/p/w500' + item.poster_path" 
                         :alt="item.title || item.name" 
                         class="w-full aspect-[2/3] object-cover">
                    <div class="rating-badge" x-show="item.vote_average > 0">
                        <span x-text="item.vote_average?.toFixed(1)"></span>
                    </div>
                    <div class="media-badge" :class="item.media_type === 'movie' ? 'movie' : 'tv'">
                        <span x-text="item.media_type === 'movie' ? 'MOVIE' : 'TV'"></span>
                    </div>
                    <div class="p-3">
                        <h3 class="text-sm font-semibold truncate" x-text="item.title || item.name"></h3>
                        <p class="text-xs text-gray-600 mt-1" x-text="item.release_date?.split('-')[0] || item.first_air_date?.split('-')[0] || ''"></p>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="content.length === 0 && !searchQuery" class="text-center py-12">
            <div class="text-gray-600">Loading...</div>
        </div>
        
        <div x-show="content.length === 0 && searchQuery" class="text-center py-12">
            <div class="text-gray-600">No results for "<span x-text="searchQuery"></span>"</div>
        </div>

        <div class="flex justify-center gap-4 items-center mt-10 flex-wrap">
            <button @click="currentPage > 1 && changePage(currentPage - 1)" 
                    :disabled="currentPage === 1"
                    class="page-btn">
                Previous
            </button>
            <span class="page-number"><span x-text="currentPage"></span></span>
            <button @click="changePage(currentPage + 1)" class="page-btn">
                Next
            </button>
        </div>
    </div>

    <script>
        function toggleMusicPanel() {
            const panel = document.getElementById('music-panel');
            panel.classList.toggle('open');
        }

        function closeMusicPanel() {
            const panel = document.getElementById('music-panel');
            panel.classList.remove('open');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
            localStorage.setItem('sidebarCollapsed', 'true');
        }

        function openSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('collapsed');
            document.body.classList.remove('sidebar-collapsed');
            localStorage.setItem('sidebarCollapsed', 'false');
        }

        const savedState = localStorage.getItem('sidebarCollapsed');
        if (savedState === 'true') {
            document.getElementById('sidebar')?.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
        }

        function app() {
            return {
                apiKey: 'fb7bb23f03b6994dafc674c074d01761',
                content: [],
                currentTab: 'all',
                currentPage: 1,
                searchQuery: '',

                async init() {
                    await this.fetchContent();
                    this.$watch('currentTab', async () => {
                        this.currentPage = 1;
                        this.searchQuery = '';
                        await this.fetchContent();
                    });
                },

                async searchContent() {
                    if (!this.searchQuery.trim()) {
                        await this.fetchContent();
                        return;
                    }
                    
                    if (this.currentTab === 'all') {
                        const movieUrl = `https://api.themoviedb.org/3/search/movie?api_key=${this.apiKey}&query=${encodeURIComponent(this.searchQuery)}&page=${this.currentPage}`;
                        const tvUrl = `https://api.themoviedb.org/3/search/tv?api_key=${this.apiKey}&query=${encodeURIComponent(this.searchQuery)}&page=${this.currentPage}`;
                        
                        const [movieRes, tvRes] = await Promise.all([fetch(movieUrl), fetch(tvUrl)]);
                        const movieData = await movieRes.json();
                        const tvData = await tvRes.json();
                        
                        let allResults = [...movieData.results, ...tvData.results];
                        allResults = allResults.map(item => {
                            item.media_type = item.title ? 'movie' : 'tv';
                            return item;
                        });
                        this.content = allResults;
                    } else {
                        const endpoint = this.currentTab === 'movies' ? 'movie' : 'tv';
                        const url = `https://api.themoviedb.org/3/search/${endpoint}?api_key=${this.apiKey}&query=${encodeURIComponent(this.searchQuery)}&page=${this.currentPage}`;
                        const response = await fetch(url);
                        const data = await response.json();
                        this.content = data.results.map(item => {
                            item.media_type = this.currentTab === 'movies' ? 'movie' : 'tv';
                            return item;
                        });
                    }
                },

                async fetchContent() {
                    if (this.currentTab === 'all') {
                        const movieUrl = `https://api.themoviedb.org/3/movie/popular?api_key=${this.apiKey}&page=${this.currentPage}`;
                        const tvUrl = `https://api.themoviedb.org/3/tv/popular?api_key=${this.apiKey}&page=${this.currentPage}`;
                        
                        const [movieRes, tvRes] = await Promise.all([fetch(movieUrl), fetch(tvUrl)]);
                        const movieData = await movieRes.json();
                        const tvData = await tvRes.json();
                        
                        let allResults = [...movieData.results, ...tvData.results];
                        allResults = allResults.map(item => {
                            item.media_type = item.title ? 'movie' : 'tv';
                            return item;
                        });
                        this.content = allResults;
                    } else {
                        const endpoint = this.currentTab === 'movies' ? 'movie/popular' : 'tv/popular';
                        const url = `https://api.themoviedb.org/3/${endpoint}?api_key=${this.apiKey}&page=${this.currentPage}`;
                        const response = await fetch(url);
                        const data = await response.json();
                        this.content = data.results.map(item => {
                            item.media_type = this.currentTab === 'movies' ? 'movie' : 'tv';
                            return item;
                        });
                    }
                },

                async changePage(page) {
                    this.currentPage = page;
                    if (this.searchQuery.trim()) {
                        await this.searchContent();
                    } else {
                        await this.fetchContent();
                    }
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                watchItem(id, type) {
                    let mediaType = type;
                    if (type === 'all') {
                        const item = this.content.find(i => i.id == id);
                        mediaType = item?.media_type === 'movie' ? 'movie' : 'tv';
                    }
                    window.location.href = `watch.html?id=${id}&type=${mediaType === 'movies' ? 'movie' : mediaType}`;
                }
            }
        }
    </script>
</body>
</html>
