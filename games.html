        * {

        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: block;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            position: relative;
        }

        .back-to-proxy-btn {
            position: absolute;
            top: 20px;
            left: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .back-to-proxy-btn:hover {
            background: #333;
            border-color: #666;
            transform: scale(1.05);
        }

        .back-to-proxy-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            position: relative;
            display: inline-block;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .game-card {
            background: #111111;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #666;
            box-shadow: 0 15px 30px rgba(255,255,255,0.1);
            background: #1a1a1a;
        }

        .game-icon {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-bottom: 2px solid #333;
            background: #222;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-name {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stats {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .game-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
        }

        .game-view.active {
            display: block;
        }

        .game-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1001;
            border-bottom: 1px solid #333;
            gap: 15px;
            flex-wrap: wrap;
        }

        .back-button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .back-button:hover {
            background: #444;
            border-color: #777;
            transform: scale(1.05);
        }

        .back-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .newtab-header-btn {
            background: #1a3a5c;
            color: white;
            border: 1px solid #2c5a8c;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .newtab-header-btn:hover {
            background: #2c5a8c;
            border-color: #4a8cbb;
            transform: scale(1.05);
        }

        .newtab-header-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .game-title {
            color: white;
            margin-left: 0;
            font-size: 1.2rem;
            font-weight: 600;
            flex-grow: 1;
        }

        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            margin-top: 60px;
            background: #000;
        }

        .error-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100% - 60px);
            margin-top: 60px;
            text-align: center;
            padding: 20px;
        }

        .error-message h3 {
            color: #ff6b6b;
            margin-bottom: 15px;
        }

        .error-message button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s ease;
        }

        .error-message button:hover {
            background: #444;
            border-color: #777;
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #333;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @media (max-width: 768px) {

        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }

        }

        const allGamesSet = new Map();
        
        const addGame = (game) => {
            if (!allGamesSet.has(game.name)) {
                allGamesSet.set(game.name, game);
            }
        };
        
        originalGames.forEach(addGame);
        githubGamesList.forEach(addGame);
        googleClassGames.forEach(addGame);
        xmlGames.forEach(addGame);
        
        const allGames = Array.from(allGamesSet.values());

        function getProxyUrl(url) {
            return `/scramjet/${encodeURIComponent(url)}`;
        }

        function getLetterIcon(gameName) {
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#34495e'];
            const colorIndex = gameName.length % colors.length;
            const initials = gameName.split(' ').map(word => word[0]).join('').slice(0, 2).toUpperCase();
            return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='${colors[colorIndex].replace('#', '%23')}'/%3E%3Ctext x='50' y='55' font-size='32' text-anchor='middle' fill='white' font-family='Arial, sans-serif' font-weight='bold'%3E${initials}%3C/text%3E%3C/svg%3E`;
        }

        function buildGamesGrid() {
            const grid = document.getElementById('gamesGrid');
            const gameCountSpan = document.getElementById('gameCount');
            grid.innerHTML = '';
            gamesData = [];
            
            allGames.forEach((game, index) => {
                gamesData.push({ name: game.name, url: game.url });
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => playGame(index, game.name, game.url);
                const iconImg = document.createElement('img');
                iconImg.className = 'game-icon';
                if (game.icon && game.icon !== "") {
                    iconImg.src = game.icon;
                    iconImg.onerror = function() { this.src = getLetterIcon(game.name); };
                } else {
                    iconImg.src = getLetterIcon(game.name);
                }
                iconImg.alt = game.name;
                iconImg.loading = 'lazy';
                const infoDiv = document.createElement('div');
                infoDiv.className = 'game-info';
                infoDiv.innerHTML = `<div class="game-name">${escapeHtml(game.name)}</div>`;
                card.appendChild(iconImg);
                card.appendChild(infoDiv);
                grid.appendChild(card);
            });
            gameCountSpan.textContent = `${gamesData.length} Games`;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function playGame(index, name, url) {
            currentGameUrl = url;
            currentGameName = name;
            
            if (loadTimeout) clearTimeout(loadTimeout);
            
            const container = document.getElementById('iframeContainer');
            const oldError = document.getElementById('errorMessage');
            if (oldError) oldError.remove();
            
            const iframe = document.getElementById('gameIframe');
            iframe.style.display = 'block';
            iframe.src = url;
            
            document.getElementById('gamesView').style.display = 'none';
            document.getElementById('gameView').classList.add('active');
            document.getElementById('gameTitle').textContent = name;
            
            loadTimeout = setTimeout(() => {
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    if (iframeDoc && iframeDoc.body) {
                        const hasContent = iframeDoc.body.children.length > 0;
                        const bodyText = iframeDoc.body.innerText || iframeDoc.body.textContent;
                        const isBlackScreen = !hasContent && (!bodyText || bodyText.trim() === '');
                        if (isBlackScreen) showErrorFallback();
                    }
                } catch(e) {}
            }, 5000);
            
            iframe.onload = () => { if (loadTimeout) clearTimeout(loadTimeout); };
            
            history.pushState({ game: index, name: name, url: url }, name, '#game');
        }

        function showErrorFallback() {
            const container = document.getElementById('iframeContainer');
            const iframe = document.getElementById('gameIframe');
            iframe.style.display = 'none';
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.id = 'errorMessage';
            errorDiv.innerHTML = `
                <h3>didnt load</h3>
                <p>Try opening in a new tab:</p>
                <button id="openNewTabBtn">Open in New Tab</button>
                <button id="goBackBtn">Back to Games</button>
            `;
            container.appendChild(errorDiv);
            document.getElementById('openNewTabBtn').onclick = () => { window.open(currentGameUrl, '_blank'); backToGames(); };
            document.getElementById('goBackBtn').onclick = () => backToGames();
        }

        function backToGames() {
            if (loadTimeout) clearTimeout(loadTimeout);
            document.getElementById('gamesView').style.display = 'block';
            document.getElementById('gameView').classList.remove('active');
            document.getElementById('gameIframe').src = 'about:blank';
            document.getElementById('gameIframe').style.display = 'block';
            const errorMsg = document.getElementById('errorMessage');
            if (errorMsg) errorMsg.remove();
            history.pushState({ view: 'games' }, 'No0ne Games', '/games');
        }

        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.game !== undefined) {
                const game = gamesData[event.state.game];
                if (game) playGame(event.state.game, game.name, game.url);
            } else {
                backToGames();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('gameView').classList.contains('active')) {
                backToGames();
            }
        });

        document.getElementById('openNewTabHeaderBtn').addEventListener('click', () => {
            if (currentGameUrl) {
                const iframe = document.getElementById('gameIframe');
                iframe.style.display = 'block';
                iframe.src = getProxyUrl(currentGameUrl);
                const errorMsg = document.getElementById('errorMessage');
                if (errorMsg) errorMsg.remove();
            }
        });

        buildGamesGrid();
    </script>
